services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: imagecreate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imagecreate"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADDR: :8080
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/imagecreate?sslmode=disable}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-string}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-before-deploy}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://proxy.example.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-change-me}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      OPENAI_REQUEST_TIMEOUT_SECONDS: ${OPENAI_REQUEST_TIMEOUT_SECONDS:-600}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_CLAIM_DELAY_SECONDS: ${WORKER_CLAIM_DELAY_SECONDS:-8}
      IMAGE_SIZE_PRESETS: ${IMAGE_SIZE_PRESETS:-{"1:1":"1024x1024","3:4":"768x1024","4:3":"1024x768","9:16":"720x1280","16:9":"1280x720"}}
      IMAGE_STORAGE_DIR: /data/images
      IMAGE_RETENTION_DAYS: ${IMAGE_RETENTION_DAYS:-30}
    volumes:
      - images:/data/images

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_PRIVATE_SUPPORT_QQ: ${VITE_PRIVATE_SUPPORT_QQ:-3764117425}
        VITE_PRIVATE_SUPPORT_WECHAT: ${VITE_PRIVATE_SUPPORT_WECHAT:-18028270324}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      DOMAIN: ${DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  images:
