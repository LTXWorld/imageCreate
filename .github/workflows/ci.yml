name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: api/go.sum

      - name: Run API tests
        working-directory: api
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run web tests
        working-directory: web
        run: npm test -- --run

      - name: Build web app
        working-directory: web
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - verify
    if: >
      needs.verify.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          vars.ENABLE_PRODUCTION_DEPLOY == 'true'
        )
      )
    permissions:
      contents: read

    steps:
      - name: Check out verified revision
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_APP_DIR"
          test -n "$APP_HEALTHCHECK_URL"

          archive="/tmp/imagecreate-${GITHUB_SHA}.tar.gz"
          remote_archive="/tmp/imagecreate-${GITHUB_SHA}.tar.gz"
          tar --exclude='.git' -czf "$archive" .
          scp -i ~/.ssh/deploy_key "$archive" "$VPS_USER@$VPS_HOST:$remote_archive"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' REMOTE_ARCHIVE='$remote_archive' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$VPS_APP_DIR"
          tar -xzf "$REMOTE_ARCHIVE" -C "$VPS_APP_DIR"
          rm -f "$REMOTE_ARCHIVE"
          cd "$VPS_APP_DIR"

          if [ ! -f .env ]; then
            echo "Missing $VPS_APP_DIR/.env. Copy .env.example to .env and fill production secrets before deploying." >&2
            exit 1
          fi

          if grep -q '^OPENAI_REQUEST_TIMEOUT_SECONDS=' .env; then
            sed -i 's/^OPENAI_REQUEST_TIMEOUT_SECONDS=.*/OPENAI_REQUEST_TIMEOUT_SECONDS=600/' .env
          else
            printf '\nOPENAI_REQUEST_TIMEOUT_SECONDS=600\n' >> .env
          fi

          docker compose up -d --build
          docker compose up -d --force-recreate caddy
          docker compose ps
          EOF

          curl --fail --show-error --silent --location \
            --retry 12 --retry-delay 5 --retry-all-errors --max-time 20 \
            "$APP_HEALTHCHECK_URL"
