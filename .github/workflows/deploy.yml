name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master' &&
        vars.ENABLE_PRODUCTION_DEPLOY == 'true'
      )
    permissions:
      contents: read

    steps:
      - name: Check out verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_APP_DIR"
          test -n "$APP_HEALTHCHECK_URL"

          archive="/tmp/imagecreate-${GITHUB_SHA}.tar.gz"
          remote_archive="/tmp/imagecreate-${GITHUB_SHA}.tar.gz"
          tar --exclude='.git' -czf "$archive" .
          scp -i ~/.ssh/deploy_key "$archive" "$VPS_USER@$VPS_HOST:$remote_archive"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' REMOTE_ARCHIVE='$remote_archive' bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$VPS_APP_DIR"
          tar -xzf "$REMOTE_ARCHIVE" -C "$VPS_APP_DIR"
          rm -f "$REMOTE_ARCHIVE"
          cd "$VPS_APP_DIR"

          if [ ! -f .env ]; then
            echo "Missing $VPS_APP_DIR/.env. Copy .env.example to .env and fill production secrets before deploying." >&2
            exit 1
          fi

          docker compose up -d --build
          docker compose ps
          EOF

          curl --fail --show-error --silent --location "$APP_HEALTHCHECK_URL"
